<rhombus-app-shell [hasNav]="hasNav()" [closeOnNavigate]="true">
  <!-- Brand → [shellBrand], links home. -->
  <a
    shellBrand
    class="folio-shell-brand"
    routerLink="/"
    [attr.aria-label]="'Go to home — ' + shellConfig().appName"
  >
    @if (shellConfig().logoUrl; as logo) {
      <img class="folio-custom-logo" [src]="logo" [alt]="shellConfig().appName" />
    } @else {
      <div class="folio-logo-mark">
        <span class="folio-logo-mark-f">F</span>
        <div class="folio-logo-dot"></div>
      </div>
    }
    <span class="folio-app-name">{{ shellConfig().appName }}</span>
  </a>

  <!-- Header actions → [shellHeaderActions]: theme + palette control. -->
  <rhombus-theme-menu shellHeaderActions />

  <!-- Navigation → [shellNav]. Hidden by the shell on bare routes (hasNav=false). -->
  <nav shellNav class="blog-nav">
    @if (navPending()) {
      @for (row of [1, 2, 3, 4]; track row) {
        <div class="nav-skeleton">
          <folio-skeleton width="5.5rem" height="1rem" borderRadius="var(--r-md)" />
        </div>
      }
    } @else {
      <rhombus-nav-list ariaLabel="Blog" [sections]="navSections()" />
    }
  </nav>

  <!-- Routed content = default slot. -->
  <router-outlet />

  <!-- Powered-by footer → [shellFooter] for starter tenants (no custom branding). -->
  @if (!shellConfig().features?.removeBranding) {
    <footer shellFooter class="folio-powered-footer">
      <span>Powered by </span>
      <a
        href="https://blog.foliokitcms.com"
        target="_blank"
        rel="noopener noreferrer"
        >FolioKit</a
      >
    </footer>
  }
</rhombus-app-shell>
