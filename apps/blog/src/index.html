<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Pre-paint theme (prevents FOUC). Keep in sync with FOLIOKIT_THEME_INIT_SCRIPT in @foliokit/cms-ui (theme-init-script.ts). -->
    <script>(function(){try{var K='rhombuskit:theme-preference';if(localStorage.getItem(K)===null){var g=localStorage.getItem('folio-theme');if(g==='light'||g==='dark'){localStorage.setItem(K,g);}}}catch(e){}})();(function(){try{var L='light',D='dark',d='system';var s=localStorage.getItem('rhombuskit:theme-preference');var p=(s===L||s===D||s==='system')?s:d;var r=p==='system'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?D:L):p;document.documentElement.setAttribute('data-theme',r);}catch(e){}})();</script>
    <title>FolioKit Blog</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Material Icons are self-hosted via the material-icons npm package (see project.json styles). -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- Comic book fonts: Bangers (display), Nunito (body), VT323 (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
