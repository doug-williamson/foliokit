<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FolioKit Docs</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="FolioKit — Angular component library for building CMS-powered portfolio sites with Firebase." />
    <meta property="og:title" content="FolioKit Docs" />
    <meta property="og:description" content="FolioKit — Angular component library for building CMS-powered portfolio sites with Firebase." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foliokitcms.com" />
    <meta property="og:image" content="https://foliokitcms.com/og-image.png" />
    <meta property="og:site_name" content="FolioKit Docs" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script>
      // Apply saved theme before first paint to avoid light-mode flash
      try {
        var t = localStorage.getItem('folio-theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme:dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
