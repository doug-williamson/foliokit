<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FolioKit Admin</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
<!-- Material Icons are registered as inlined SVGs by provideAdminKit(). No global font required. -->
    <script>
      // Apply saved theme before first paint to avoid light-mode flash
      try {
        var t = localStorage.getItem('folio-theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme:dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <app-root>
      <div style="height:100vh;background:var(--bg, #F8FAFD)"></div>
    </app-root>
  </body>
</html>
