<mat-sidenav-container class="shell-container">
  <mat-sidenav
    class="shell-sidenav"
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="sidenavOpen()"
    (openedChange)="sidenavOpen.set($event)"
  >
    <ng-content select="[shellNav]" />
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <mat-toolbar class="shell-toolbar">
      @if (isMobile()) {
        <button mat-icon-button aria-label="Toggle navigation" (click)="toggleSidenav()">
          <mat-icon>menu</mat-icon>
        </button>
      }

      @if (config.logoUrl) {
        <img [src]="config.logoUrl" [alt]="config.appName" class="shell-logo" />
      }
      <span class="shell-app-name">{{ config.appName }}</span>

      <span class="flex-1"></span>

      <button
        mat-icon-button
        [attr.aria-label]="theme.scheme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        (click)="toggleTheme()"
      >
        <mat-icon>{{ theme.scheme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <ng-content select="[shellHeaderActions]" />

      @if (config.showAuth) {
        <ng-content select="[shellAuthSlot]" />
      }
    </mat-toolbar>

    <main class="shell-main">
      <ng-content />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
