<rhombus-app-shell
  [mobileBreakpoint]="sidenavMobileMaxPx()"
  [closeOnNavigate]="true"
>
  <!-- Brand → rhombus [shellBrand]; links to toolbarHomeRoute when set. -->
  @if (config().toolbarHomeRoute; as home) {
    <a
      shellBrand
      class="folio-shell-brand"
      [routerLink]="home"
      [attr.aria-label]="'Go to home — ' + config().appName"
    >
      <ng-container *ngTemplateOutlet="brandInner" />
    </a>
  } @else {
    <span shellBrand class="folio-shell-brand">
      <ng-container *ngTemplateOutlet="brandInner" />
    </span>
  }

  <!-- Header actions → rhombus [shellHeaderActions]: consumer actions, optional
       auth slot, optional new-post button, then the theme control. -->
  <span shellHeaderActions class="folio-header-actions">
    <ng-content select="[shellHeaderActions]" />
    @if (config().showAuth) {
      <ng-content select="[shellAuthSlot]" />
    }
    @if (config().showNewPostButton) {
      <button
        type="button"
        class="folio-new-post"
        aria-label="New post"
        (click)="navigateToNewPost()"
      >
        +
      </button>
    }
    <rhombus-theme-menu />
  </span>

  <!-- Nav → rhombus [shellNav]. -->
  <nav shellNav>
    <ng-content select="[shellNav]" />
  </nav>

  <!-- Nav footer → rhombus [shellNavFooter], rendered only when a consumer
       projects footer content (detected via ShellNavFooterDirective). -->
  @if (navFooter) {
    <ng-container shellNavFooter>
      <ng-content select="[shellNavFooter]" />
    </ng-container>
  }

  <!-- Default slot = main content. -->
  <ng-content />
  <!-- Powered-by footer → rhombus [shellFooter] (pinned below the main scroll
       region by the shell; no .rhombus-app-shell__main flexbox hack needed). -->
  @if (!config().features?.removeBranding && !config().showNewPostButton) {
    <footer shellFooter class="folio-powered-footer">
      <span>Powered by </span>
      <a
        href="https://blog.foliokitcms.com"
        target="_blank"
        rel="noopener noreferrer"
        >FolioKit</a
      >
    </footer>
  }
</rhombus-app-shell>

<ng-template #brandInner>
  @if (config().logoUrl) {
    <img
      class="folio-custom-logo"
      [src]="config().logoUrl"
      [alt]="config().appName"
    />
  } @else {
    <div class="folio-logo-mark">
      <span class="folio-logo-mark-f">F</span>
      <div class="folio-logo-dot"></div>
    </div>
  }
  <span class="folio-app-name">{{ config().appName }}</span>
</ng-template>
