<!-- Shared top-bar actions. rhombus-app-shell renders its own toolbar on docs
     routes; the non-docs branch hand-rolls one. Both pull this content so the
     chrome can't drift. -->
<ng-template #headerActions>
  <a mat-button routerLink="/docs" class="docs-nav-link">Docs</a>

  <span class="docs-version-badge">v1.0.0</span>

  <a
    mat-icon-button
    href="https://github.com/foliokit"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="FolioKit on GitHub"
  >
    <mat-icon svgIcon="github" />
  </a>

  <a mat-flat-button routerLink="/signup">Get Started</a>

  <folio-theme-control />
</ng-template>

@if (isDocsRoute()) {
  <rhombus-app-shell class="docs-shell-host" [mobileBreakpoint]="959" [closeOnNavigate]="true">
    <a shellBrand routerLink="/" class="docs-logo" aria-label="FolioKit home">FolioKit</a>

    <div shellHeaderActions class="docs-header-actions">
      <ng-container [ngTemplateOutlet]="headerActions" />
    </div>

    <nav shellNav class="flex flex-col h-full overflow-y-auto py-4">
      <docs-nav [manifest]="manifest" />
    </nav>

    @if (isXl()) {
      <aside shellAside>
        <div class="sticky top-6 px-4 py-6">
          <docs-anchor-nav />
        </div>
      </aside>
    }

    <main class="min-w-0 px-8 py-6 max-w-[800px] mx-auto">
      <docs-page-header />
      <router-outlet />
    </main>
  </rhombus-app-shell>
} @else {
  <!-- GATE FINDING: rhombus-app-shell@0.6.0 has no bare / no-sidenav mode (it
       always renders the mat-sidenav-container; there is no `hasNav` gate), so
       non-docs routes ('', /signup, /**) that must be full-width keep the
       hand-rolled toolbar + outlet. Do not force them through the shell — an
       empty open sidenav would render on desktop. -->
  <div class="docs-bare-wrap">
    <mat-toolbar class="docs-topbar">
      <a routerLink="/" class="docs-logo" aria-label="FolioKit home">FolioKit</a>
      <span class="docs-topbar-spacer"></span>
      <div class="docs-header-actions">
        <ng-container [ngTemplateOutlet]="headerActions" />
      </div>
    </mat-toolbar>

    <div class="docs-bare-content">
      <router-outlet />
    </div>
  </div>
}
