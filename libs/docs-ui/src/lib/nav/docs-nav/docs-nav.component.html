<nav class="nav-root">
  @for (node of manifest(); track node.path) {
    <div class="nav-section">
      <a
        class="nav-l1"
        [routerLink]="node.path"
        routerLinkActive="nav-l1--active"
        (click)="node.children ? toggle(node.path) : null"
      >
        @if (node.icon) {
          <mat-icon class="nav-l1-icon">{{ node.icon }}</mat-icon>
        }
        <span class="nav-l1-label">{{ node.label }}</span>
        @if (node.badge) {
          <span class="nav-badge">{{ node.badge }}</span>
        }
        @if (node.children) {
          <svg
            class="nav-chevron ml-auto"
            [class.nav-chevron--open]="isExpanded(node.path)"
            width="12" height="12" viewBox="0 0 12 12"
            fill="none" aria-hidden="true"
          >
            <path d="M4.5 2 L8.5 6 L4.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </a>

      @if (node.children) {
        <mat-expansion-panel class="nav-panel" [expanded]="isExpanded(node.path)">
          <div class="nav-l2-group">
            @for (child of node.children; track child.path) {
              <a
                class="nav-l2"
                [routerLink]="child.path"
                routerLinkActive="nav-l2--active"
              >
                <span class="nav-l2-label">{{ child.label }}</span>
                @if (child.badge) {
                  <span class="nav-badge">{{ child.badge }}</span>
                }
              </a>
            }
          </div>
        </mat-expansion-panel>
      }
    </div>
  }
</nav>
