<mat-tab-group rhombusTabGroup class="docs-preview">
  <mat-tab label="Preview">
    <div class="docs-preview__preview-pane">
      <ng-content />
    </div>
  </mat-tab>

  <mat-tab label="Code">
    <div class="docs-preview__code-pane">
      <rhombus-code-block [code]="code" />
    </div>
  </mat-tab>
</mat-tab-group>
