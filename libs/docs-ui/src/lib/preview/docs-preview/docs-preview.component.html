<mat-tab-group rhombusTabGroup class="docs-preview">
  <mat-tab label="Preview">
    <div class="docs-preview__preview-pane">
      <ng-content />
    </div>
  </mat-tab>

  <mat-tab label="Code">
    <div class="docs-preview__code-pane">
      <button
        mat-icon-button
        type="button"
        class="docs-preview__copy-btn"
        [title]="copied() ? 'Copied!' : 'Copy code'"
        (click)="copy()"
      >
        <rhombus-icon [name]="copied() ? 'check' : 'content_copy'" />
      </button>
      <pre class="docs-preview__pre"><code
        class="hljs"
        [innerHTML]="highlightedHtml() ?? escapedCode()"
      ></code></pre>
    </div>
  </mat-tab>
</mat-tab-group>
