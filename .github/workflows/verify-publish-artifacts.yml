name: Verify publish artifacts

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: verify-packs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build libs and npm pack --dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build publishable libraries
        run: npm run build:libs

      - name: Verify pack contents (dry-run)
        run: npm run verify:packs
