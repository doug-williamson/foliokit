name: Deploy Admin

on:
  push:
    branches: [master]
    paths:
      - 'apps/admin/**'
      - 'libs/cms-core/**'
      - 'libs/cms-ui/**'
      - 'libs/cms-admin-ui/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Admin
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build admin app
        run: npx nx build admin --configuration=production
        env:
          NG_APP_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NG_APP_FIREBASE_AUTH_DOMAIN: foliokit-6f974.firebaseapp.com
          NG_APP_FIREBASE_PROJECT_ID: foliokit-6f974
          NG_APP_FIREBASE_STORAGE_BUCKET: foliokit-6f974.firebasestorage.app
          NG_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          NG_APP_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: foliokit-6f974
          target: foliokit-admin
