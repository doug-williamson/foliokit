name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'apps/docs/**'
      - 'libs/cms-core/**'
      - 'libs/cms-ui/**'
      - 'libs/docs-ui/**'
      - 'libs/cms-markdown/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build docs app
        run: npx nx build docs --configuration=production
        # Firebase Web client config is PUBLIC (it ships to browsers and already
        # lives in apphosting.yaml). Inlined here so the build needs no extra
        # secrets — the ONLY credential this workflow requires is the deploy-step
        # FIREBASE_SERVICE_ACCOUNT. Keep these values in sync with apphosting.yaml.
        env:
          NG_APP_FIREBASE_API_KEY: AIzaSyDlmd0n-lwYUbSr9sC5tiye1icCIQ0D4ss
          NG_APP_FIREBASE_AUTH_DOMAIN: foliokit-6f974.firebaseapp.com
          NG_APP_FIREBASE_PROJECT_ID: foliokit-6f974
          NG_APP_FIREBASE_STORAGE_BUCKET: foliokit-6f974.firebasestorage.app
          NG_APP_FIREBASE_MESSAGING_SENDER_ID: "897410998393"
          NG_APP_FIREBASE_APP_ID: "1:897410998393:web:80cc5f51627f499c20b4a8"

      - name: Verify deploy credential is configured
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SERVICE_ACCOUNT" ]; then
            echo "::error::Missing required secret FIREBASE_SERVICE_ACCOUNT. Add a Firebase service-account JSON (role: Firebase Hosting Admin) under Settings → Secrets and variables → Actions. Easiest path: run 'firebase init hosting:github' from an account with access to project foliokit-6f974."
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set +e
          set -o pipefail
          TOOLS_VERSION=15.22.3
          TARGET=foliokit-docs
          LIVE_URL=https://foliokit-docs.web.app

          # Authenticate firebase-tools via Application Default Credentials,
          # mirroring what action-hosting-deploy did internally.
          cred="$RUNNER_TEMP/firebase-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$cred"
          export GOOGLE_APPLICATION_CREDENTIALS="$cred"
          trap 'rm -f "$cred"' EXIT

          out=$(npx -y "firebase-tools@${TOOLS_VERSION}" deploy \
            --only "hosting:${TARGET}" \
            --project foliokit-6f974 \
            --non-interactive 2>&1)
          code=$?
          echo "$out"

          if [ "$code" -ne 0 ]; then
            # On the live channel firebase-tools exits non-zero with FAILED_PRECONDITION
            # ("is the current active version") in two benign cases:
            #   (a) built content is byte-identical to what's already live (no-op), or
            #   (b) a transient "premature close" retries a release that already landed.
            # Both mean the live site already holds the intended content -> success.
            if echo "$out" | grep -q "is the current active version"; then
              echo "::notice::Hosting version already active (benign no-op / retried release); treating as success."
            else
              echo "::error::Firebase deploy failed (exit ${code})."
              exit "$code"
            fi
          fi

          # Guard: the live site must actually serve.
          status=$(curl -s -o /dev/null -w '%{http_code}' -L "$LIVE_URL")
          echo "Live ${LIVE_URL} -> HTTP ${status}"
          [ "$status" = "200" ] || { echo "::error::Live site not returning 200 (${status})."; exit 1; }
